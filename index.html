
<style>
*{box-sizing:border-box;margin:0;padding:0}
.wrap{padding:1.5rem;font-family:var(--font-sans);max-width:860px;margin:0 auto;background:linear-gradient(180deg,#FCFDFE 0%,#F3F8FC 100%);border:1px solid #D8E4EF;border-radius:18px;box-shadow:0 18px 42px rgba(33,61,92,0.08)}
.title{font-size:24px;font-weight:800;color:#15324A;letter-spacing:-0.02em;margin-bottom:1rem}
.sheet{width:100%;border-collapse:separate;border-spacing:0;font-size:14px;table-layout:fixed;background:#FFFFFF;border:1px solid #D8E4EF;border-radius:14px;overflow:hidden}
.sheet th,.sheet td{border-bottom:1px solid #E3EBF3;padding:10px 12px;text-align:left;color:var(--color-text-primary);background:#FFFFFF}
.sheet th{background:#EEF4F8;font-weight:700;font-size:13px;color:#496174;text-transform:uppercase;letter-spacing:0.03em}
.sheet tbody tr:last-child td{border-bottom:none}
.sheet input[type=text]{width:100%;border:1px solid #C9D8E6;background:#F9FBFD;font-size:14px;color:#15324A;padding:9px 10px;outline:none;text-align:right;border-radius:10px;transition:border-color .2s ease, box-shadow .2s ease, background-color .2s ease}
.sheet input[type=text]:focus{background:#FFFFFF;border-color:#4C8DDA;box-shadow:0 0 0 3px rgba(76,141,218,0.15)}
.sheet .num{text-align:right}
.sheet .total-row td{font-weight:700;background:#E3F0FB;color:#0C447C;border-bottom:none}
.sheet .label-cell{color:#587083;font-size:13px}
.sheet .val-cell{text-align:right;font-weight:700;color:#15324A}
.sheet .row-divider td{padding:0;border:none;height:14px;background:transparent}
.sheet .row-divider td::before{content:"";display:block;border-top:2px solid #D8E4EF}
.add-btn{margin-top:14px;padding:10px 16px;font-size:13px;font-weight:700;border:1px solid #C5D7E7;border-radius:10px;background:#FFFFFF;color:#15324A;cursor:pointer;box-shadow:0 8px 18px rgba(33,61,92,0.08);transition:transform .2s ease, box-shadow .2s ease, background-color .2s ease}
.add-btn:hover{background:#F4F8FB;transform:translateY(-1px);box-shadow:0 12px 24px rgba(33,61,92,0.12)}
.del-btn{border:none;background:none;color:var(--color-text-tertiary);cursor:pointer;font-size:16px;padding:0 4px;line-height:1}
.del-btn:hover{color:#E24B4A}
.formula-hint{font-size:12px;color:#6D8192;margin-top:10px}
</style>

<div class="wrap">
  <div class="title">Milling dimension cost calculator</div>
  <table class="sheet" id="mainTable">
    <thead>
      <tr>
        <th style="width:36px"></th>
        <th style="width:140px">Length (mm)</th>
        <th style="width:140px">Width (mm)</th>
        <th style="width:220px">Calculation type</th>
        <th style="width:100px;text-align:right">Value</th>
      </tr>
    </thead>
    <tbody id="rowsBody"></tbody>
    <tfoot id="summaryFoot"></tfoot>
  </table>
  <button class="add-btn" onclick="addRow()">+ Add row</button>
  <div class="formula-hint">
    Length width: ((2×(L+W))/1000)×200 &nbsp;|&nbsp; Thickness: ((2×L×W)/100)×0.3
  </div>
</div>

<script>
let rows = [{length:'500', width:'180'}];

function calcLW(l,w){ return ((2*(l+w))/1000)*200; }
function calcThick(l,w){ return ((2*l*w)/100)*0.3; }
function toNumber(val){ return val === '' ? 0 : Number(val); }

function render(){
  const tbody = document.getElementById('rowsBody');
  const tfoot = document.getElementById('summaryFoot');

  let totalAll = 0;

  tbody.innerHTML = rows.map((r,i)=>{
    const length = toNumber(r.length);
    const width = toNumber(r.width);
    const hasDimensions = r.length !== '' && r.width !== '';
    const lw = hasDimensions ? calcLW(length, width) : 0;
    const th = hasDimensions ? calcThick(length, width) : 0;
    const sub = lw + th;
    totalAll += sub;
    return `
    <tr>
      <td><button class="del-btn" onclick="delRow(${i})">×</button></td>
      <td><input type="text" inputmode="numeric" value="${r.length}" onchange="setVal(${i},'length',this.value)" onblur="setVal(${i},'length',this.value)"></td>
      <td><input type="text" inputmode="numeric" value="${r.width}" onchange="setVal(${i},'width',this.value)" onblur="setVal(${i},'width',this.value)"></td>
      <td class="label-cell">Length width calculation</td>
      <td class="val-cell">${lw.toFixed(2)}</td>
    </tr>
    <tr>
      <td></td><td></td><td></td>
      <td class="label-cell">Thickness calculation</td>
      <td class="val-cell">${th.toFixed(2)}</td>
    </tr>
    <tr>
      <td></td><td></td><td></td>
      <td class="label-cell" style="font-weight:500">Row ${i+1} total</td>
      <td class="val-cell" style="font-weight:500">${sub.toFixed(2)}</td>
    </tr>
    ${i < rows.length - 1 ? `<tr class="row-divider"><td colspan="5"></td></tr>` : ''}
    `;
  }).join('');

  tfoot.innerHTML = `
    <tr class="total-row">
      <td colspan="3"></td>
      <td>Total</td>
      <td class="num">${totalAll.toFixed(2)}</td>
    </tr>
  `;
}

function setVal(i, key, val){
  rows[i][key] = val;
  render();
}

function addRow(){
  rows.push({length:'', width:''});
  render();
}

function delRow(i){
  if(rows.length===1){ rows[0]={length:'',width:''}; render(); return; }
  rows.splice(i,1);
  render();
}

render();
</script>
